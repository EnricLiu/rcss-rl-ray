runtime:
  ray_address: local
  experiment_name: rcss-shooting
  timestamp_experiment_name: true
  num_iterations: 1000
  checkpoint_freq: 10
  checkpoint_num_to_keep: 20

ppo:
  num_env_runners: 4
  num_envs_per_runner: 1
  num_cpus_per_runner: 0.4
  num_learners: 0
  num_cpus_per_learner: auto
  num_gpus_per_learner: 0.0
  train_batch_size: 4000
  sgd_minibatch_size: 128
  num_sgd_iter: 10
  lr: 0.0003
  gamma: 0.99
  entropy_coeff: 0.01
  clip_param: 0.3

infrastructure:
  grpc:
    host: 0.0.0.0
    port: 0
  allocator:
    host: rcss-env-allocator.rcss-gateway-dev.svc.cluster.local
    port: 80

curriculum:
  type: shooting
  debug: false
  agent_unum: 2
  team_side: left
  our_player_num: 2
  oppo_player_num: 1
  our_goalie_unum: 1
  oppo_goalie_unum: 1
  time_up: 5000
  goal_l: 1
  goal_r: 1
  our_team_name: nexus-prime
  oppo_team_name: bot
  player_agent_image: CLSFramework/soccer-simulation-proxy
  player_bot_image: HELIOS/helios-base
  reward_goal: 10.0
  reward_concede: 10.0
  reward_out_of_bounds: 1.0
  reward_kickable_bonus: 0.5
  reward_agent_to_ball_shaping: 1.0
  reward_ball_to_goal_shaping: 1.0
  reward_ball_velocity_to_goal: 0.05
  gamma_shaping: 0.99
  shaping_clip: 0.1
  reward_time_decay: 0.001
  max_cycle_gap: 5

logging:
  enable_aim: false
  aim_repo: /mnt/aim

